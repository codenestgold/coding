<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Codenest Gold</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="img1.PNG">

  <style>
    body{margin:0;font-family:Tajawal,Arial;background:#0f172a;color:#fff}
    .topbar{display:flex;align-items:center;gap:10px;padding:14px;background:#1e293b}
    .logo{width:42px;height:42px;border-radius:10px;object-fit:cover}
    .title{font-size:22px;font-weight:800}

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
      padding:16px;
    }

    .card{
      background:#1e293b;
      border-radius:16px;
      overflow:hidden;
      border:1px solid #334155;
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
      cursor:pointer;
    }

    .content{padding:12px}
    .btn{padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer}
    .buy{background:#22c55e;color:#052e16;width:100%}

    /* MODAL */
    .modal{
      position:fixed;inset:0;background:rgba(0,0,0,.7);
      display:none;align-items:center;justify-content:center;
      padding:20px;z-index:999;
    }
    .modal-box{
      background:#0f172a;border-radius:16px;
      max-width:700px;width:100%;padding:20px;
      border:1px solid #334155;
    }
    .modal img{width:100%;border-radius:10px;margin-bottom:10px}
    .close{background:#ef4444;color:#fff;margin-top:10px}
  </style>
</head>
<body>

  <div class="topbar">
    <img src="img1.PNG" class="logo">
    <div class="title">Codenest Gold</div>
  </div>

  <div class="grid" id="grid"></div>

  <!-- MODAL DETAILS -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <div id="modalImages"></div>
      <div id="modalDesc" style="line-height:1.8;margin-top:10px"></div>
      <button class="btn close" onclick="closeModal()">إغلاق</button>
    </div>
  </div>

<script>
const products = [
  {
    id:"p1",
    name:"ملف البداية الذهبية",
    price:120,
    desc:"وصف كامل ومفصل للملف الأول يشرح كل مميزاته وطريقة استخدامه.",
    image:"PUT_IMAGE_1",
    images:["PUT_IMAGE_1","PUT_IMAGE_1_2","PUT_IMAGE_1_3"],
    download:"PUT_DOWNLOAD_1"
  },
  {
    id:"p2",
    name:"صفحة المراجعة السريعة",
    price:180,
    desc:"تفاصيل كاملة عن الصفحة الثانية ومميزاتها واستخداماتها.",
    image:"PUT_IMAGE_2",
    images:["PUT_IMAGE_2","PUT_IMAGE_2_2"],
    download:"PUT_DOWNLOAD_2"
  }
];

const grid=document.getElementById("grid");

products.forEach(p=>{
  grid.innerHTML+=`
  <div class="card">
    <img src="${p.image}" onclick="openModal('${p.id}')">
    <div class="content">
      <h3>${p.name}</h3>
      <p>${p.price} كوينز</p>
      <button class="btn buy" onclick="buy('${p.download}')">شراء</button>
    </div>
  </div>`;
});

function openModal(id){
  const p=products.find(x=>x.id===id);
  const modal=document.getElementById("modal");
  const images=document.getElementById("modalImages");
  const desc=document.getElementById("modalDesc");

  images.innerHTML="";
  p.images.forEach(i=>{
    images.innerHTML+=`<img src="${i}">`;
  });

  desc.innerText=p.desc;
  modal.style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function buy(link){
  alert("بعد الربط بالكوينز، هنا هيتخصم الرصيد ويظهر اللينك");
  window.open(link,"_blank");
}
</script>

</body>
</html>
